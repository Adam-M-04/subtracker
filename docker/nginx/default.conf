server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    server_tokens off;

    # Zabezpieczenie: root celuje tylko w /public. Reszta aplikacji (folder /src) jest niedostępna z zewnątrz.
    root /var/www/html/public;
    index index.php index.html;

    # Wzorzec Front Controller: jeśli plik nie istnieje, przekaż żądanie do index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Obsługa skryptów PHP (przekazanie do kontenera php-fpm na port 9000)
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\. {
        deny all;
    }
}