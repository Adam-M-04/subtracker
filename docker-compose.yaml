version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: subtracker_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: subtracker_php
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=subtracker_db
      - DB_USER=postgres
      - DB_PASSWORD=secretpassword
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: subtracker_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: subtracker_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secretpassword
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./docker/db/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  db_data: